<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1410"/>
      <stop offset="100%" stop-color="#0E0B08"/>
    </linearGradient>
    <filter id="fglow">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#fbg)"/>
  <!-- Doc lines -->
  <rect x="6"  y="8"  width="13" height="2"   rx="0.8" fill="white" opacity="0.78"/>
  <rect x="6"  y="12" width="18" height="1.5" rx="0.75" fill="white" opacity="0.35"/>
  <rect x="6"  y="16" width="16" height="1.5" rx="0.75" fill="white" opacity="0.30"/>
  <rect x="6"  y="20" width="14" height="1.5" rx="0.75" fill="white" opacity="0.27"/>
  <rect x="6"  y="24" width="10" height="1.5" rx="0.75" fill="white" opacity="0.22"/>
  <!-- Beam -->
  <rect x="3" y="14.5" width="26" height="2" rx="1"
        fill="#FF6020" opacity="0.95"
        transform="rotate(-1.5 16 15.5)"
        filter="url(#fglow)"/>
</svg>