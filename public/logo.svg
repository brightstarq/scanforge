<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1410"/>
      <stop offset="100%" stop-color="#0E0B08"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#FF5C1A" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#FF7A3A" stop-opacity="1"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="40" height="40" rx="9" fill="url(#bg)"/>

  <!-- Document lines (left-aligned, slightly indented) -->
  <rect x="8"  y="10" width="16" height="2"   rx="1" fill="white" opacity="0.75"/>
  <rect x="8"  y="15" width="22" height="1.5" rx="0.75" fill="white" opacity="0.35"/>
  <rect x="8"  y="19" width="20" height="1.5" rx="0.75" fill="white" opacity="0.30"/>
  <rect x="8"  y="23" width="18" height="1.5" rx="0.75" fill="white" opacity="0.28"/>
  <rect x="8"  y="27" width="14" height="1.5" rx="0.75" fill="white" opacity="0.22"/>

  <!-- Scanner beam — slightly tilted (the "drift") -->
  <rect x="4" y="18.5" width="32" height="2" rx="1"
        fill="url(#beam)"
        transform="rotate(-1.5 20 19.5)"
        filter="url(#glow)"/>

  <!-- Beam glow halo -->
  <rect x="4" y="16" width="32" height="7" rx="3"
        fill="#FF6020" opacity="0.08"
        transform="rotate(-1.5 20 19.5)"/>
</svg>